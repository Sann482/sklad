<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Склад волокна</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-sklad-180.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f4f6f8;--card:#fff;--line:#e2e8f0;--txt:#1e293b;--mut:#64748b;--acc:#7c3aed;--grn:#16a34a;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--txt);padding:16px;}
h1{font-size:22px;margin-bottom:4px;}
.sub{color:var(--mut);font-size:13px;margin-bottom:14px;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tab{padding:9px 18px;border:1px solid var(--line);background:var(--card);border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--mut);}
.tab.act{background:var(--acc);color:#fff;border-color:var(--acc);}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{background:#f1f5f9;text-align:left;padding:7px 9px;border-bottom:2px solid var(--line);white-space:nowrap;position:sticky;top:0;}
td{padding:6px 9px;border-bottom:1px solid var(--line);overflow:hidden;text-overflow:ellipsis;}
tr:hover td{background:#f8fafc;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.grand td{background:#ede9fe;font-weight:700;}
label{display:block;font-size:12.5px;font-weight:600;color:var(--mut);margin-bottom:3px;}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;background:#fff;}
input:focus,select:focus,textarea:focus{outline:2px solid #ddd6fe;border-color:var(--acc);}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
.row>div{flex:1;min-width:120px;}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:14.5px;font-weight:700;cursor:pointer;color:#fff;background:var(--acc);}
.btn.grn{background:var(--grn);} .btn.red{background:var(--red);}
.btn.sm{padding:5px 12px;font-size:12.5px;font-weight:600;}
.btn.ghost{background:#fff;color:var(--txt);border:1px solid var(--line);}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.chip{padding:6px 14px;border:1px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;font-size:13px;}
.chip.act{background:var(--acc);color:#fff;border-color:var(--acc);}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:12px;font-weight:700;}
.b-in{background:#dcfce7;color:#166534;} .b-out{background:#fee2e2;color:#991b1b;}
.msg{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:14px;display:none;}
.msg.ok{background:#dcfce7;color:#166534;display:block;}
.msg.err{background:#fee2e2;color:#991b1b;display:block;}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 18px;flex:1;min-width:150px;}
.stat .v{font-size:20px;font-weight:800;} .stat .l{font-size:12px;color:var(--mut);}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.tools{display:flex;gap:8px;flex-wrap:wrap;}
.scroll{max-height:65vh;overflow:auto;}
.del{color:var(--red);cursor:pointer;font-weight:700;border:none;background:none;font-size:15px;}
.zero td{color:#94a3b8;}
th.srt{cursor:pointer;user-select:none;position:relative;}
th.srt:hover{background:#e2e8f0;}
th.drag-over{background:#ddd6fe!important;}
.rsz{position:absolute;top:0;right:-4px;width:9px;height:100%;cursor:col-resize;z-index:5;}
.rsz:hover{background:#c4b5fd;}
.relwrap{position:relative;display:inline-block;}
.colmenu{position:absolute;right:0;top:110%;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 14px;box-shadow:0 4px 14px rgba(0,0,0,.15);z-index:50;display:none;min-width:190px;}
.colmenu label{display:flex;gap:8px;align-items:center;font-size:13px;margin:6px 0;color:var(--txt);font-weight:500;cursor:pointer;}
.colmenu input{width:auto;}
.banner{background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.balebox{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.bale{border:1px solid var(--line);border-radius:8px;padding:7px 12px;background:#fff;cursor:pointer;font-size:13.5px;user-select:none;}
.bale.sel{background:var(--acc);color:#fff;border-color:var(--acc);font-weight:700;}
.balelist{color:var(--mut);font-size:12.5px;}
.zB td{background:#eef2f7;}
@media(max-width:700px){
 body{padding:8px;}
 h1{font-size:18px;}
 .tools .btn{padding:6px 9px;font-size:12px;}
 .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
 .tab{padding:8px 13px;font-size:13px;flex:0 0 auto;}
 .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
 .stat{min-width:0;padding:10px 12px;}
 .stat .v{font-size:17px;}
 input,select,textarea{font-size:16px;}
 .hint{display:none;}
 .ssr{flex:1 1 100%;}
 .scroll{max-height:none;-webkit-overflow-scrolling:touch;}
 #logTable{min-width:760px;}
 td,th{padding:5px 6px;font-size:12.5px;}
}
.mcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:7px;}
.mcard.zero2{opacity:.55;}
.mc1{font-size:14.5px;margin-bottom:3px;}
.mc2{font-size:13px;color:var(--mut);}
.mc2 b{color:var(--txt);font-size:14px;}
.msec{background:#e0e7ff;border-radius:8px;padding:7px 12px;font-weight:700;font-size:13px;margin:10px 0 7px;}
.msec2{background:#fee2e2;}
.mtot{padding:6px 12px;font-weight:700;font-size:13px;color:var(--mut);}
.grandm{background:#dbeafe;border-radius:8px;color:var(--txt);margin-top:6px;padding:9px 12px;}
</style>
</head>
<body>
<div class="hdr">
<div><h1>🧵 Склад волокна</h1><div class="sub">Потюковий облік (кожен тюк зі своєю вагою) · <span id="storageInfo">сховище: браузер</span></div></div>
<div class="tools">
<a class="btn ghost sm" href="./" style="text-decoration:none">⌂ Меню</a>
<button class="btn ghost sm" onclick="tgSend(event)" title="Shift+клік — налаштування">📲 Telegram</button>
<button class="btn ghost sm" onclick="exportXLSX()">⬇ Експорт Excel</button>
<button class="btn ghost sm" onclick="backup()">💾 Резервна копія</button>
<button class="btn ghost sm" onclick="document.getElementById('restoreFile').click()">📂 Відновити</button>
<input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restore(this)">
</div>
</div>

<div class="tabs">
<button class="tab act" data-t="stock" onclick="showTab('stock')">Склад</button>
<button class="tab" data-t="in" onclick="showTab('in')">➕ Прихід</button>
<button class="tab" data-t="out" onclick="showTab('out')">➖ Списання</button>
<button class="tab" data-t="log" onclick="showTab('log')">Журнал</button>
<button class="tab" data-t="rep" onclick="showTab('rep')">Звіт за день</button>
</div>

<!-- СКЛАД -->
<div id="tab-stock">
<div class="stats" id="stockStats"></div>
<div class="card">
<div class="row" style="margin-bottom:8px;align-items:center">
<div class="ssr" style="flex:2"><input id="stockSearch" placeholder="Пошук: Бік, Вєтнам, 15HC ..." oninput="renderStock()"></div>
<div><label style="display:inline"><input type="checkbox" id="hideZero" style="width:auto" onchange="renderStock()" checked> приховати нульові</label></div>
<div class="relwrap" style="flex:0;min-width:auto">
<button class="btn ghost sm" onclick="toggleColMenu()">⚙ Колонки</button>
<div class="colmenu" id="colMenu"></div>
</div>
</div>
<div class="scroll"><table id="stockTable"></table></div>
<div id="stockCards"></div>
<div class="sub hint" style="margin-top:6px">Клік по заголовку — сортування · перетягніть заголовок — змінити порядок · потягніть за правий край заголовка — змінити ширину</div>
</div>
</div>

<!-- ПРИХІД -->
<div id="tab-in" style="display:none">
<div class="card">
<h3 style="margin-bottom:12px">➕ Прихід волокна</h3>
<div class="msg" id="inMsg"></div>
<div class="row">
<div style="flex:2"><label>Існуюча позиція (необов'язково)</label><select id="inExist" onchange="fillFromExist()"><option value="">— нова позиція —</option></select></div>
</div>
<div class="row">
<div><label>Назва волокна</label><input id="inName" placeholder="Бік (Elit) / 15HC ..."></div>
<div><label>Країна походження</label><input id="inCountry" placeholder="Китай / Вєтнам / —"></div>
</div>
<div class="row">
<div style="flex:2"><label>Ваги тюків, кг (через пробіл або кому)</label><textarea id="inWeights" rows="2" placeholder="287 287 289 320..."></textarea></div>
</div>
<div class="sub" style="margin-bottom:8px">або однакові тюки:</div>
<div class="row">
<div><label>Кількість тюків</label><input id="inQty" type="number" min="1" placeholder="15"></div>
<div><label>Вага 1 тюка, кг</label><input id="inOneKg" type="number" step="0.1" placeholder="320"></div>
<div><label>Дата</label><input id="inDate" type="date"></div>
<div style="flex:2"><label>Коментар</label><input id="inComment" placeholder="постачальник, накладна..."></div>
</div>
<div class="sub" id="inCalc"></div>
<button class="btn grn" onclick="doIn()">Оприбуткувати</button>
</div>
</div>

<!-- СПИСАННЯ -->
<div id="tab-out" style="display:none">
<div class="card">
<h3 style="margin-bottom:12px">➖ Списання (відвантаження)</h3>
<div class="msg" id="outMsg"></div>
<div class="row">
<div style="flex:3"><label>Позиція (тільки з залишком)</label><select id="outItem" onchange="renderBales()"></select></div>
</div>
<div><label>Оберіть тюки, які списуються (клік по тюку):</label></div>
<div class="balebox" id="baleBox"></div>
<div class="row">
<div style="flex:0"><button class="btn ghost sm" onclick="selectAllBales()">Вибрати всі</button></div>
<div class="sub" id="outCalc" style="margin:auto 0"></div>
</div>
<div class="row">
<div><label>Дата</label><input id="outDate" type="date"></div>
<div style="flex:2"><label>Клієнт</label><input id="outClient" placeholder="кому відвантажено"></div>
<div style="flex:2"><label>Коментар</label><input id="outComment"></div>
</div>
<button class="btn red" onclick="doOut()">Списати вибрані тюки</button>
</div>
</div>

<!-- ЖУРНАЛ -->
<div id="tab-log" style="display:none">
<div class="card">
<div class="row">
<div><label>З дати</label><input type="date" id="logFrom" onchange="renderLog()"></div>
<div><label>По дату</label><input type="date" id="logTo" onchange="renderLog()"></div>
<div><label>Тип</label><select id="logType" onchange="renderLog()"><option value="">Всі операції</option><option value="in">Прихід</option><option value="out">Списання</option></select></div>
<div style="flex:2"><label>Пошук</label><input id="logSearch" placeholder="волокно, клієнт..." oninput="renderLog()"></div>
</div>
<div class="sub" id="logTotals"></div>
<div class="scroll"><table id="logTable"></table></div>
</div>
</div>

<!-- ЗВІТ -->
<div id="tab-rep" style="display:none">
<div class="card">
<h3 style="margin-bottom:10px">Звіт по списанню</h3>
<div class="chips">
<button class="chip act" onclick="repQuick('today',this)">Сьогодні</button>
<button class="chip" onclick="repQuick('yest',this)">Вчора</button>
<button class="chip" onclick="repQuick('week',this)">7 днів</button>
<button class="chip" onclick="repQuick('month',this)">Місяць</button>
</div>
<div class="row">
<div><label>З дати</label><input type="date" id="repFrom" onchange="renderRep()"></div>
<div><label>По дату</label><input type="date" id="repTo" onchange="renderRep()"></div>
</div>
<div id="repBody"></div>
</div>
</div>

<script>
const INITIAL = [{"name":"Бік (Elit)","country":"Китай","bales":[320,320,320,320,320,320,320,320,320,320,320,320,320,320,320]},{"name":"Бік (Huvis)","country":"Корея","bales":[320,320,320,320,320,320,320,320]},{"name":"7 НС","country":"Вєтнам","bales":[]},{"name":"15HC","country":"Вєтнам","bales":[287,287,287,289,289,287,288,287,286]},{"name":"15HC","country":"Єгипет","bales":[251,220]},{"name":"7НСS","country":"Вєтнам","bales":[296,294,291,292,293]},{"name":"15НСS","country":"Вєтнам","bales":[295]},{"name":"15НСS","country":"Єгипет","bales":[261,240,261,284,258]},{"name":"15/64 Solid","country":"","bales":[]},{"name":"6/64 Solid","country":"","bales":[250,250,250,250,250,250]}];
const CLOUD_PATH='volokno';
const LS_KEY='voloknoSklad_v1';
let DB;

function today(){return new Date().toISOString().slice(0,10);}
function newId(){DB.nextId=Math.max((DB.nextId||0)+1,Date.now());return DB.nextId;}
function keyOf(it){return (it.name||'').trim().toLowerCase()+'|'+(it.country||'').trim().toLowerCase();}
function nameOf(it){return it.name+(it.country?' ('+it.country+')':'');}
function kgOf(it){return +it.bales.reduce((s,b)=>s+b,0).toFixed(1);}
function fmt(n){return (+n).toLocaleString('uk-UA');}

function load(){
  try{DB=JSON.parse(localStorage.getItem(LS_KEY));}catch(e){DB=null;}
  if(!DB||!DB.items){
    DB={items:{},ops:[],seeded:today()};
    INITIAL.forEach(it=>{DB.items[keyOf(it)]={name:it.name,country:it.country,bales:it.bales.slice()};});
    save();
  }
}
function save(){
  localStorage.setItem(LS_KEY,JSON.stringify(DB));
  srvPush();
}

/* ---------- ЗБЕРЕЖЕННЯ У ФАЙЛ НА ДИСКУ ---------- */
let fileHandle=null,pendingHandle=null;
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('voloknoFS',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function idbSet(k,v){const d=await idb();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite');t.objectStore('kv').put(v,k);t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function idbGet(k){const d=await idb();return new Promise((res,rej)=>{const t=d.transaction('kv');const q=t.objectStore('kv').get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}
async function writeFile(){
  if(!fileHandle)return;
  try{const w=await fileHandle.createWritable();await w.write(JSON.stringify(DB));await w.close();}
  catch(e){alert('⚠ Не вдалося записати у файл даних: '+e.message+'\nЗробіть «Резервна копія», щоб не втратити дані.');}
}
function updateStorageInfo(){}
const JSON_TYPE=[{description:'Дані складу волокна',accept:{'application/json':['.json']}}];
async function connectDataFile(){
  if(!window.showSaveFilePicker){alert('Ваш браузер не підтримує збереження у файл — потрібен Chrome або Edge.\nНаразі дані зберігаються у браузері. Регулярно робіть «Резервна копія».');return;}
  try{
    let h;
    if(confirm('OK — створити НОВИЙ файл даних.\nСкасувати — відкрити ВЖЕ ІСНУЮЧИЙ файл даних.')){
      h=await showSaveFilePicker({suggestedName:'volokno-dani.json',types:JSON_TYPE});
      fileHandle=h;await writeFile();
    }else{
      [h]=await showOpenFilePicker({types:JSON_TYPE});
      fileHandle=h;
      try{const d=JSON.parse(await (await h.getFile()).text());if(d&&d.items)DB=d;else await writeFile();}
      catch(e){await writeFile();}
    }
    await idbSet('handle',h);
    localStorage.removeItem(LS_KEY);
    updateStorageInfo();showTab('stock');
    alert('✔ Дані тепер зберігаються у файлі «'+h.name+'» на вашому диску, а не в браузері.\nКожна операція записується автоматично.');
  }catch(e){/* скасовано */}
}
async function useHandle(h){
  fileHandle=h;
  try{const d=JSON.parse(await (await h.getFile()).text());if(d&&d.items)DB=d;}catch(e){}
  localStorage.removeItem(LS_KEY);
  document.getElementById('fileBanner').style.display='none';
  updateStorageInfo();renderStock();
}
async function reopenFile(){
  if(!pendingHandle)return;
  try{
    const p=await pendingHandle.requestPermission({mode:'readwrite'});
    if(p==='granted')await useHandle(pendingHandle);
  }catch(e){}
}
async function initStorage(){
  try{
    const h=await idbGet('handle');
    if(h&&h.queryPermission){
      if(await h.queryPermission({mode:'readwrite'})==='granted')await useHandle(h);
      else{pendingHandle=h;document.getElementById('fileBanner').style.display='flex';}
    }
  }catch(e){}
  updateStorageInfo();
}


/* ---------- ХМАРНА СИНХРОНІЗАЦІЯ ---------- */
const CL_KEY=LS_KEY+'_cloud';
let CL=null;try{CL=JSON.parse(localStorage.getItem(CL_KEY));}catch(e){}
let cloudStatus='';
function cloudEp(){return CL.url+'/'+encodeURIComponent(CLOUD_PATH+'-'+CL.key)+'.json';}
function setCloudStatus(s){cloudStatus=s;updateStorageInfo();}
async function cloudPut(){
  if(!CL)return;
  try{
    const r=await fetch(cloudEp(),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(DB)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    setCloudStatus('синхронізовано '+new Date().toTimeString().slice(0,5));
  }catch(e){setCloudStatus('⚠ НЕ синхронізовано — перевірте інтернет');}
}
async function cloudLoad(silent){
  if(!CL)return;
  try{
    const r=await fetch(cloudEp());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d&&d.items){DB=d;afterCloudLoad();}
    setCloudStatus('синхронізовано '+new Date().toTimeString().slice(0,5));
  }catch(e){
    setCloudStatus('⚠ офлайн — показано локальну копію');
    if(!silent)alert('Хмара недоступна: '+e.message);
  }
}
function afterCloudLoad(){
  localStorage.setItem(LS_KEY,JSON.stringify(DB));
  renderStock();
}
async function cloudSetup(){
  if(CL&&confirm('Хмарна синхронізація вже увімкнена.\nOK — змінити налаштування.\nСкасувати — ВИМКНУТИ хмару на цьому пристрої.')===false){
    localStorage.removeItem(CL_KEY);CL=null;updateStorageInfo();
    alert('Хмарну синхронізацію вимкнено. Дані залишилися у хмарі та локально.');
    return;
  }
  let url=prompt('Крок 1/2. Вставте адресу бази Firebase (Database URL),\nнаприклад: https://mijsklad-default-rtdb.europe-west1.firebasedatabase.app',(CL&&CL.url)||'');
  if(url===null)return;
  url=url.trim().replace(/\/+$/,'');
  if(!url.startsWith('http')){alert('Це не схоже на адресу. Вона має починатися з https://');return;}
  let key=prompt('Крок 2/2. Придумайте секретний ключ (довге слово/фраза).\nНа ВСІХ пристроях вводьте однаковий ключ — це ваш пароль до даних.',(CL&&CL.key)||'');
  if(key===null)return;
  key=key.trim();
  if(key.length<4){alert('Ключ закороткий — потрібно мінімум 4 символи.');return;}
  CL={url,key};
  try{
    const r=await fetch(cloudEp());
    if(!r.ok)throw new Error('HTTP '+r.status+' — перевірте адресу і правила доступу бази');
    const d=await r.json();
    if(d&&d.items){
      if(confirm('У хмарі ВЖЕ Є дані ('+Object.keys(d.items).length+' позицій).\nOK — завантажити хмарні дані на цей пристрій.\nСкасувати — ЗАМІНИТИ хмарні дані локальними.')){DB=d;afterCloudLoad();}
      else await cloudPut();
    }else await cloudPut();
    localStorage.setItem(CL_KEY,JSON.stringify(CL));
    updateStorageInfo();renderStock();
    alert('✔ Хмару підключено! Тепер усі пристрої з цією адресою і ключем бачать одні й ті самі залишки.');
  }catch(e){CL=null;alert('Не вдалося підключитися: '+e.message);}
}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&CL)cloudLoad(true);});


/* ---------- TELEGRAM ---------- */
const TG_KEY=LS_KEY+'_tg';
let TG=null;try{TG=JSON.parse(localStorage.getItem(TG_KEY));}catch(e){}
async function tgSetup(){
  if(TG&&!confirm('Telegram вже підключено ('+(TG.name||TG.chat)+').\nOK — змінити налаштування.\nСкасувати — вимкнути надсилання.')){
    localStorage.removeItem(TG_KEY);TG=null;alert('Telegram вимкнено.');return;
  }
  let token=prompt('Крок 1/2. Вставте токен бота.\n(У Telegram знайдіть @BotFather → /newbot → отримаєте токен виду 1234567:AAH...)',(TG&&TG.token)||'');
  if(token===null)return;token=token.trim();
  if(!/^\d+:[A-Za-z0-9_-]+$/.test(token)){alert('Це не схоже на токен бота.');return;}
  alert('Крок 2/2. Відкрийте Telegram, знайдіть СВОГО бота за назвою і надішліть йому будь-яке повідомлення (наприклад «привіт»).\nПісля цього натисніть OK.');
  try{
    const r=await fetch('https://api.telegram.org/bot'+token+'/getUpdates');
    const d=await r.json();
    if(!d.ok)throw new Error(d.description||'невірний токен');
    const m=(d.result||[]).reverse().find(u=>u.message&&u.message.chat);
    if(!m){alert('Бот ще не отримав повідомлень. Напишіть йому в Telegram і спробуйте ще раз.');return;}
    TG={token,chat:m.message.chat.id,name:m.message.chat.first_name||''};
    localStorage.setItem(TG_KEY,JSON.stringify(TG));
    alert('✔ Підключено чат «'+(TG.name||TG.chat)+'». Тепер кнопка «📲 Telegram» надсилає залишки одним кліком.');
  }catch(e){alert('Помилка: '+e.message);}
}
async function tgSend(ev){
  if(ev&&ev.shiftKey){tgSetup();return;}
  if(!TG){await tgSetup();if(!TG)return;}
  const base='https://api.telegram.org/bot'+TG.token;
  try{
    const r=await fetch(base+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TG.chat,text:tgSummary()})});
    const d=await r.json();if(!d.ok)throw new Error(d.description);
    if(typeof XLSX!=='undefined'){
      const buf=XLSX.write(buildWB(),{bookType:'xlsx',type:'array'});
      const fd=new FormData();
      fd.append('chat_id',TG.chat);
      fd.append('document',new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}),'Залишки_волокно_'+today()+'.xlsx');
      await fetch(base+'/sendDocument',{method:'POST',body:fd});
    }
    alert('✔ Залишки надіслано в Telegram');
  }catch(e){alert('Не вдалося надіслати: '+e.message+'\n(Shift+клік по кнопці — переналаштувати бота)');}
}
function tgSummary(){
  let tc=0,tk=0,txt='🧵 ВОЛОКНО — залишки на '+today()+'\n\n';
  itemsSorted().forEach(it=>{
    if(!it.bales.length)return;
    const k=kgOf(it);tc+=it.bales.length;tk+=k;
    txt+=nameOf(it)+': '+it.bales.length+' тюк. · '+fmt(k)+' кг\n';
  });
  txt+='\nВСЬОГО: '+fmt(tc)+' тюків · '+fmt(Math.round(tk))+' кг';
  txt+='\nПовна таблиця — у файлі нижче 👇';
  return txt.slice(0,4000);
}
const SRV_STORE='volokno';

/* ---------- СЕРВЕР ---------- */
let REV=0;
function setSrvStatus(s){const el=document.getElementById('storageInfo');if(el)el.innerHTML='🌐 '+s;}
async function srvPull(silent){
  try{
    const r=await fetch('api/'+SRV_STORE);
    if(r.status===401){location.href='login';return;}
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j&&j.data&&j.data.items){
      DB=j.data;REV=j.rev;
      localStorage.setItem(LS_KEY,JSON.stringify(DB));
      renderStock();
    }else{
      REV=(j&&j.rev)||0;
      await srvPushNow();
    }
    setSrvStatus('синхронізовано '+new Date().toTimeString().slice(0,5));
  }catch(e){setSrvStatus('⚠ офлайн — показано локальну копію');}
}
async function srvPushNow(){
  const r=await fetch('api/'+SRV_STORE,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({rev:REV,data:DB})});
  if(r.status===401){location.href='login';return;}
  if(r.status===409){
    const j=await r.json();
    if(!j.data){REV=j.rev||0;return srvPushNow();}
    DB=j.data;REV=j.rev;
    renderStock();
    alert('Дані щойно оновили з іншого пристрою — екран синхронізовано. Повторіть вашу останню операцію.');
    return;
  }
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();REV=j.rev;
  setSrvStatus('синхронізовано '+new Date().toTimeString().slice(0,5));
}
function srvPush(){srvPushNow().catch(e=>setSrvStatus('⚠ НЕ збережено на сервер — перевірте інтернет!'));}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')srvPull(true);});
setInterval(()=>{if(document.visibilityState==='visible')srvPull(true);},60000);

function showTab(t){

/* ---------- СКЛАД: колонки, сортування, ширина, приховування ---------- */
function balesStr(it){
  const s=it.bales.join(', ');
  return s.length>70?s.slice(0,70)+'…':(s||'—');
}
const COLS={
  name   :{label:'Назва',        num:false, val:it=>'<b>'+it.name+'</b>', sort:it=>it.name},
  country:{label:'Країна',       num:false, val:it=>it.country||'—', sort:it=>it.country||''},
  count  :{label:'Тюків, шт',    num:true,  val:it=>'<b>'+fmt(it.bales.length)+'</b>', sort:it=>it.bales.length},
  kg     :{label:'Вага, кг',     num:true,  val:it=>fmt(kgOf(it)), sort:it=>kgOf(it)},
  avg    :{label:'Середній тюк', num:true,  val:it=>it.bales.length?fmt(+(kgOf(it)/it.bales.length).toFixed(1)):'—', sort:it=>it.bales.length?kgOf(it)/it.bales.length:0},
  bales  :{label:'Ваги тюків',   num:false, val:it=>`<span class="balelist" title="${it.bales.join(', ')}">${balesStr(it)}</span>`, sort:it=>it.bales.length}
};
const DEFAULT_ORDER=['name','country','count','kg','avg','bales'];
function prefs(){
  if(!DB.prefs)DB.prefs={};
  if(!Array.isArray(DB.prefs.colOrder)||DB.prefs.colOrder.length!==DEFAULT_ORDER.length)DB.prefs.colOrder=DEFAULT_ORDER.slice();
  if(!DB.prefs.sort)DB.prefs.sort={col:null,dir:1};
  if(!Array.isArray(DB.prefs.hidden))DB.prefs.hidden=[];
  if(!DB.prefs.colW)DB.prefs.colW={};
  return DB.prefs;
}
function sortBy(col){
  if(rszFlag)return;
  const p=prefs();
  if(p.sort.col===col){ if(p.sort.dir===1)p.sort.dir=-1; else p.sort={col:null,dir:1}; }
  else p.sort={col,dir:1};
  save();renderStock();
}
let dragCol=null;
function colDrop(target){
  const p=prefs(), o=p.colOrder;
  const from=o.indexOf(dragCol), to=o.indexOf(target);
  if(from<0||to<0||from===to)return;
  o.splice(to,0,o.splice(from,1)[0]);
  save();renderStock();
}
function toggleColMenu(){
  const m=document.getElementById('colMenu');
  if(m.style.display==='block'){m.style.display='none';return;}
  const p=prefs();
  m.innerHTML='<b style="font-size:12px;color:var(--mut)">Показувати колонки:</b>'+
    p.colOrder.map(id=>`<label><input type="checkbox" ${p.hidden.includes(id)?'':'checked'} onchange="toggleCol('${id}')"> ${COLS[id].label}</label>`).join('')+
    `<button class="btn ghost sm" style="margin-top:6px;width:100%" onclick="resetCols()">↺ Скинути налаштування</button>`;
  m.style.display='block';
}
function toggleCol(id){
  const p=prefs();
  if(p.hidden.includes(id))p.hidden=p.hidden.filter(x=>x!==id);
  else{
    if(p.hidden.length>=DEFAULT_ORDER.length-1){alert('Має лишитись хоча б одна колонка');return;}
    p.hidden.push(id);
  }
  save();renderStock();toggleColMenu();toggleColMenu();
}
function resetCols(){
  const p=prefs();
  p.hidden=[];p.colW={};p.colOrder=DEFAULT_ORDER.slice();p.sort={col:null,dir:1};
  save();renderStock();
  document.getElementById('colMenu').style.display='none';
}
let rszFlag=false;
function startRsz(e,id){
  e.preventDefault();e.stopPropagation();
  rszFlag=true;
  const th=e.target.parentElement, startX=e.clientX, startW=th.offsetWidth, p=prefs();
  const tbl=document.getElementById('stockTable');
  tbl.querySelectorAll('tr:first-child th').forEach(t=>{if(t.dataset.col)p.colW[t.dataset.col]=p.colW[t.dataset.col]||t.offsetWidth;});
  tbl.style.tableLayout='fixed';
  const move=ev=>{p.colW[id]=Math.max(50,startW+ev.clientX-startX);th.style.width=p.colW[id]+'px';};
  const up=()=>{
    document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);
    save();renderStock();
    setTimeout(()=>rszFlag=false,80);
  };
  document.addEventListener('mousemove',move);
  document.addEventListener('mouseup',up);
}
function itemsSorted(){
  return Object.values(DB.items).sort((a,b)=>a.name.localeCompare(b.name,'uk')||((a.country||'').localeCompare(b.country||'','uk')));
}
function renderStockMobile(){
  const q=(document.getElementById('stockSearch').value||'').toLowerCase();
  const hz=document.getElementById('hideZero').checked;
  const p=prefs();
  let items=itemsSorted();
  if(p.sort.col){
    const c=COLS[p.sort.col], d=p.sort.dir;
    items=items.slice().sort((a,b)=>{const va=c.sort(a),vb=c.sort(b);return (typeof va==='string'?va.localeCompare(vb,'uk'):va-vb)*d;});
  }
  let html='',g={c:0,k:0};
  items.forEach(it=>{
    if(hz&&!it.bales.length)return;
    if(q&&!nameOf(it).toLowerCase().includes(q))return;
    const k=kgOf(it);g.c+=it.bales.length;g.k+=k;
    const ws=it.bales.join(', ');
    const hid=id=>p.hidden.includes(id);
    const l2=[];
    if(!hid('count'))l2.push(`<b>${fmt(it.bales.length)} тюків</b>`);
    if(!hid('kg'))l2.push(fmt(k)+' кг');
    if(!hid('avg')&&it.bales.length)l2.push('сер. '+fmt(+(k/it.bales.length).toFixed(1)));
    html+=`<div class="mcard${it.bales.length?'':' zero2'}"><div class="mc1"><b>${it.name}</b>${(!hid('country')&&it.country)?' · '+it.country:''}</div>${l2.length?`<div class="mc2">${l2.join(' · ')}</div>`:''}${(ws&&!hid('bales'))?`<div class="mc2" style="margin-top:2px">${ws}</div>`:''}</div>`;
  });
  html+=`<div class="mtot grandm">ВСЬОГО: ${fmt(g.c)} тюків · ${fmt(Math.round(g.k))} кг</div>`;
  document.getElementById('stockTable').innerHTML='';
  document.getElementById('stockCards').innerHTML=html;
  const todOut=DB.ops.filter(o=>o.type==='out'&&o.date===today());
  const todIn=DB.ops.filter(o=>o.type==='in'&&o.date===today());
  document.getElementById('stockStats').innerHTML=
   `<div class="stat"><div class="v">${fmt(g.c)}</div><div class="l">тюків</div></div>
    <div class="stat"><div class="v">${fmt(Math.round(g.k))}</div><div class="l">кг</div></div>
    <div class="stat"><div class="v" style="color:var(--red)">${fmt(todOut.reduce((s,o)=>s+o.kg,0))}</div><div class="l">списано сьогодні, кг</div></div>
    <div class="stat"><div class="v" style="color:var(--grn)">${fmt(todIn.reduce((s,o)=>s+o.kg,0))}</div><div class="l">прихід сьогодні, кг</div></div>`;
}
function renderStock(){
  if(window.matchMedia&&window.matchMedia('(max-width:700px)').matches)return renderStockMobile();
  const q=(document.getElementById('stockSearch').value||'').toLowerCase();
  const hz=document.getElementById('hideZero').checked;
  const p=prefs();
  const order=p.colOrder.filter(id=>!p.hidden.includes(id));
  let items=itemsSorted();
  if(p.sort.col&&!p.hidden.includes(p.sort.col)){
    const c=COLS[p.sort.col], d=p.sort.dir;
    items=items.slice().sort((a,b)=>{
      const va=c.sort(a), vb=c.sort(b);
      return (typeof va==='string'? va.localeCompare(vb,'uk') : va-vb)*d;
    });
  }
  let html='<tr>'+order.map(id=>{
    const c=COLS[id];
    const arrow=p.sort.col===id?(p.sort.dir===1?' ▲':' ▼'):'';
    const wst=p.colW[id]?` style="width:${p.colW[id]}px"`:'';
    return `<th class="srt${c.num?' num':''}" draggable="true" data-col="${id}"${wst}
      onclick="sortBy('${id}')"
      ondragstart="if(rszFlag){event.preventDefault();return false;}dragCol='${id}'"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="event.preventDefault();this.classList.remove('drag-over');colDrop('${id}')"
      title="Клік — сортування, перетягніть — порядок, правий край — ширина">⠿ ${c.label}${arrow}<span class="rsz" draggable="false" onmousedown="startRsz(event,'${id}')" onclick="event.stopPropagation()"></span></th>`;
  }).join('')+'</tr>';
  let g={c:0,k:0};
  items.forEach(it=>{
    if(hz&&!it.bales.length)return;
    const txt=(nameOf(it)).toLowerCase();
    if(q&&!txt.includes(q))return;
    g.c+=it.bales.length;g.k+=kgOf(it);
    html+=`<tr class="${it.bales.length?'':'zero'}">`+order.map(id=>`<td${COLS[id].num?' class="num"':''}>${COLS[id].val(it)}</td>`).join('')+'</tr>';
  });
  const tv={count:fmt(g.c),kg:fmt(+g.k.toFixed(1))};
  let labelDone=false;
  html+='<tr class="grand">'+order.map(id=>{
    if(id in tv){const pre=(!labelDone&&order[0]===id)?'ВСЬОГО: ':'';labelDone=labelDone||!!pre;return `<td class="num">${pre}${tv[id]}</td>`;}
    if(!labelDone){labelDone=true;return '<td>ВСЬОГО</td>';}
    return '<td></td>';
  }).join('')+'</tr>';
  const tbl=document.getElementById('stockTable');
  tbl.innerHTML=html;
  const _sc=document.getElementById('stockCards');if(_sc)_sc.innerHTML='';
  if(tbl.style)tbl.style.tableLayout=Object.keys(p.colW).length?'fixed':'auto';
  const todOut=DB.ops.filter(o=>o.type==='out'&&o.date===today());
  const todIn=DB.ops.filter(o=>o.type==='in'&&o.date===today());
  document.getElementById('stockStats').innerHTML=
   `<div class="stat"><div class="v">${fmt(g.c)}</div><div class="l">тюків на складі</div></div>
    <div class="stat"><div class="v">${fmt(+g.k.toFixed(1))}</div><div class="l">кг на складі</div></div>
    <div class="stat"><div class="v" style="color:var(--red)">${fmt(todOut.reduce((s,o)=>s+o.kg,0))} кг</div><div class="l">списано сьогодні (${todOut.reduce((s,o)=>s+o.count,0)} тюків)</div></div>
    <div class="stat"><div class="v" style="color:var(--grn)">${fmt(todIn.reduce((s,o)=>s+o.kg,0))} кг</div><div class="l">прихід сьогодні (${todIn.reduce((s,o)=>s+o.count,0)} тюків)</div></div>`;
}

/* ---------- ПРИХІД ---------- */
function prepIn(){
  document.getElementById('inDate').value=today();
  const sel=document.getElementById('inExist');
  sel.innerHTML='<option value="">— нова позиція —</option>'+itemsSorted().map(it=>`<option value="${keyOf(it)}">${nameOf(it)} (${it.bales.length} тюків, ${fmt(kgOf(it))} кг)</option>`).join('');
}
function fillFromExist(){
  const k=document.getElementById('inExist').value;
  if(!k)return;
  const it=DB.items[k];
  inName.value=it.name;inCountry.value=it.country||'';
}
function parseWeights(){
  const txt=(inWeights.value||'').trim();
  if(txt){
    const w=txt.split(/[\s,;]+/).map(x=>parseFloat(x.replace(',','.'))).filter(x=>x>0);
    return w;
  }
  const q=+inQty.value, one=+inOneKg.value;
  if(q>0&&one>0)return Array(q).fill(one);
  return [];
}
function doIn(){
  const msg=document.getElementById('inMsg');
  const name=inName.value.trim(), country=inCountry.value.trim(), date=inDate.value;
  const w=parseWeights();
  if(!name||!date||!w.length){msg.className='msg err';msg.textContent='Заповніть назву, дату і ваги тюків (списком або кількість × вага).';return;}
  const it={name,country,bales:[]};
  const k=keyOf(it);
  if(!DB.items[k])DB.items[k]=it;
  DB.items[k].bales.push(...w);
  const kg=+w.reduce((s,x)=>s+x,0).toFixed(1);
  DB.ops.push({id:newId(),type:'in',date,key:k,count:w.length,kg,weights:w,client:'',comment:inComment.value.trim(),ts:new Date().toISOString()});
  save();
  msg.className='msg ok';msg.textContent=`✔ Оприбутковано ${w.length} тюків (${fmt(kg)} кг) — ${nameOf(DB.items[k])}. Тепер: ${DB.items[k].bales.length} тюків, ${fmt(kgOf(DB.items[k]))} кг.`;
  inWeights.value='';inQty.value='';inOneKg.value='';inComment.value='';
  prepIn();
}

/* ---------- СПИСАННЯ ---------- */
let selBales=new Set();
function prepOut(){
  document.getElementById('outDate').value=today();
  const sel=document.getElementById('outItem');
  const items=itemsSorted().filter(i=>i.bales.length>0);
  sel.innerHTML='<option value="">— оберіть позицію —</option>'+items.map(it=>`<option value="${keyOf(it)}">${nameOf(it)} (${it.bales.length} тюків, ${fmt(kgOf(it))} кг)</option>`).join('');
  selBales=new Set();
  renderBales();
}
function renderBales(){
  const k=outItem.value, box=document.getElementById('baleBox');
  selBales=new Set([...selBales].filter(i=>DB.items[k]&&i<DB.items[k].bales.length));
  if(!k){box.innerHTML='<span class="sub">Спочатку оберіть позицію</span>';outCalcUpd();return;}
  const it=DB.items[k];
  box.innerHTML=it.bales.map((w,i)=>`<div class="bale${selBales.has(i)?' sel':''}" onclick="toggleBale(${i})">№${i+1} · ${w} кг</div>`).join('');
  outCalcUpd();
}
function toggleBale(i){
  if(selBales.has(i))selBales.delete(i);else selBales.add(i);
  renderBales();
}
function selectAllBales(){
  const k=outItem.value;if(!k)return;
  const it=DB.items[k];
  if(selBales.size===it.bales.length)selBales=new Set();
  else selBales=new Set(it.bales.map((_,i)=>i));
  renderBales();
}
function outCalcUpd(){
  const k=outItem.value, el=document.getElementById('outCalc');
  if(!k||!selBales.size){el.textContent=selBales.size?'':'Тюки не вибрано';return;}
  const it=DB.items[k];
  const kg=[...selBales].reduce((s,i)=>s+it.bales[i],0);
  el.innerHTML=`Вибрано: <b>${selBales.size} тюків, ${fmt(+kg.toFixed(1))} кг</b> → залишиться ${it.bales.length-selBales.size} тюків`;
}
function doOut(){
  const msg=document.getElementById('outMsg');
  const k=outItem.value, date=outDate.value;
  if(!k||!selBales.size||!date){msg.className='msg err';msg.textContent='Оберіть позицію, тюки і дату.';return;}
  const it=DB.items[k];
  const idx=[...selBales].sort((a,b)=>b-a);
  const removed=[];
  idx.forEach(i=>{removed.push(it.bales[i]);it.bales.splice(i,1);});
  const kg=+removed.reduce((s,x)=>s+x,0).toFixed(1);
  DB.ops.push({id:newId(),type:'out',date,key:k,count:removed.length,kg,weights:removed,client:outClient.value.trim(),comment:outComment.value.trim(),ts:new Date().toISOString()});
  save();
  msg.className='msg ok';msg.textContent=`✔ Списано ${removed.length} тюків (${fmt(kg)} кг) — ${nameOf(it)}. Залишок: ${it.bales.length} тюків, ${fmt(kgOf(it))} кг.`;
  outClient.value='';outComment.value='';
  prepOut();
}

/* ---------- ЖУРНАЛ ---------- */
function renderLog(){
  const f=logFrom.value,t=logTo.value,ty=logType.value,q=(logSearch.value||'').toLowerCase();
  let ops=DB.ops.slice().reverse();
  ops=ops.filter(o=>(!f||o.date>=f)&&(!t||o.date<=t)&&(!ty||o.type===ty));
  if(q)ops=ops.filter(o=>{const it=DB.items[o.key];return ((it?nameOf(it):'')+' '+(o.client||'')+' '+(o.comment||'')).toLowerCase().includes(q);});
  let html='<tr><th>Дата</th><th>Операція</th><th>Волокно</th><th class="num">Тюків</th><th class="num">кг</th><th>Ваги тюків</th><th>Клієнт</th><th>Коментар</th><th></th></tr>';
  let ti=0,to=0,ki=0,ko=0,prevB=null,zeb=false;
  ops.forEach(o=>{
    const it=DB.items[o.key];
    if(o.type==='in'){ti+=o.count;ki+=o.kg;}else{to+=o.count;ko+=o.kg;}
    const ws=(o.weights||[]).join(', ');
    const bkey=((o.ts||'').slice(0,16)||o.id)+'|'+o.type;
    if(bkey!==prevB){zeb=!zeb;prevB=bkey;}
    html+=`<tr class="${zeb?'zA':'zB'}"><td style="white-space:nowrap">${o.date} <span class="balelist">${(o.ts||'').slice(11,16)}</span></td><td><span class="badge ${o.type==='in'?'b-in':'b-out'}">${o.type==='in'?'Прихід':'Списання'}</span></td><td>${it?nameOf(it):o.key}</td><td class="num">${o.count}</td><td class="num">${fmt(o.kg)}</td><td><span class="balelist" title="${ws}">${ws.length>40?ws.slice(0,40)+'…':ws}</span></td><td>${o.client||''}</td><td>${o.comment||''}</td><td><button class="del" title="Видалити операцію (поверне залишок)" onclick="delOp(${o.id})">✕</button></td></tr>`;
  });
  if(!ops.length)html+='<tr><td colspan="9" style="text-align:center;color:var(--mut)">Операцій немає</td></tr>';
  else{
    if(ti)html+=`<tr class="grand"><td colspan="3">РАЗОМ ПРИХІД</td><td class="num">${fmt(ti)}</td><td class="num">${fmt(+ki.toFixed(1))}</td><td colspan="4"></td></tr>`;
    if(to)html+=`<tr class="grand"><td colspan="3">РАЗОМ СПИСАНО</td><td class="num">${fmt(to)}</td><td class="num">${fmt(+ko.toFixed(1))}</td><td colspan="4"></td></tr>`;
  }
  document.getElementById('logTable').innerHTML=html;
  document.getElementById('logTotals').innerHTML=`Прихід: <b style="color:var(--grn)">${fmt(ti)} тюків / ${fmt(+ki.toFixed(1))} кг</b> &nbsp;·&nbsp; Списано: <b style="color:var(--red)">${fmt(to)} тюків / ${fmt(+ko.toFixed(1))} кг</b> &nbsp;·&nbsp; операцій: ${ops.length}`;
}
function delOp(id){
  const o=DB.ops.find(x=>x.id===id);
  if(!o)return;
  if(!confirm('Видалити операцію? Залишок буде відкориговано назад.'))return;
  const it=DB.items[o.key];
  if(it){
    if(o.type==='out')it.bales.push(...(o.weights||[]));
    else (o.weights||[]).forEach(w=>{const i=it.bales.indexOf(w);if(i>=0)it.bales.splice(i,1);});
  }
  DB.ops=DB.ops.filter(x=>x.id!==id);
  save();renderLog();
}

/* ---------- ЗВІТ ---------- */
function repQuick(p,btn){
  btn.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('act'));
  btn.classList.add('act');
  const d=new Date();const iso=x=>x.toISOString().slice(0,10);
  if(p==='today'){repFrom.value=today();repTo.value=today();}
  if(p==='yest'){d.setDate(d.getDate()-1);repFrom.value=iso(d);repTo.value=iso(d);}
  if(p==='week'){const e=today();d.setDate(d.getDate()-6);repFrom.value=iso(d);repTo.value=e;}
  if(p==='month'){repFrom.value=today().slice(0,8)+'01';repTo.value=today();}
  renderRep();
}
function renderRep(){
  const f=repFrom.value||today(),t=repTo.value||today();
  const ops=DB.ops.filter(o=>o.type==='out'&&o.date>=f&&o.date<=t);
  const grp={};
  ops.forEach(o=>{
    if(!grp[o.key])grp[o.key]={count:0,kg:0,clients:new Set()};
    grp[o.key].count+=o.count;grp[o.key].kg+=o.kg;
    if(o.client)grp[o.key].clients.add(o.client);
  });
  let html=`<div class="sub">Списання за період <b>${f}</b> — <b>${t}</b></div>`;
  if(!ops.length){html+='<p style="color:var(--mut)">За цей період списань не було.</p>';}
  else{
    let tc=0,tk=0;
    html+='<table><tr><th>Волокно</th><th class="num">Тюків</th><th class="num">кг</th><th>Клієнти</th></tr>';
    Object.entries(grp).forEach(([k,v])=>{
      const it=DB.items[k];tc+=v.count;tk+=v.kg;
      html+=`<tr><td>${it?nameOf(it):k}</td><td class="num">${fmt(v.count)}</td><td class="num">${fmt(+v.kg.toFixed(1))}</td><td>${[...v.clients].join(', ')}</td></tr>`;
    });
    html+=`<tr class="grand"><td>ВСЬОГО СПИСАНО</td><td class="num">${fmt(tc)}</td><td class="num">${fmt(+tk.toFixed(1))}</td><td>${ops.length} операцій</td></tr></table>`;
  }
  document.getElementById('repBody').innerHTML=html;
}

/* ---------- ЕКСПОРТ / БЕКАП ---------- */
function buildWB(){
  const wb=XLSX.utils.book_new();
  const s1=itemsSorted().map(it=>({'Назва':it.name,'Країна':it.country||'','Тюків (шт)':it.bales.length,'Вага (кг)':kgOf(it),'Ваги тюків':it.bales.join(', ')}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(s1),'Залишки');
  const s2=DB.ops.map(o=>{const it=DB.items[o.key];return{'Дата':o.date,'Операція':o.type==='in'?'Прихід':'Списання','Волокно':it?nameOf(it):o.key,'Тюків':o.count,'кг':o.kg,'Ваги':(o.weights||[]).join(', '),'Клієнт':o.client||'','Коментар':o.comment||''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(s2),'Журнал');
  return wb;
}
function exportXLSX(){
  if(typeof XLSX==='undefined'){alert('Немає інтернету — бібліотека Excel не завантажилась.');return;}
  XLSX.writeFile(buildWB(),'Склад_волокно_'+today()+'.xlsx');
}
function backup(){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(DB));
  a.download='volokno_backup_'+today()+'.json';a.click();
}
function restore(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.items)throw 0;DB=d;save();showTab('stock');alert('Дані відновлено ✔');}catch(x){alert('Невірний файл резервної копії');}};
  r.readAsText(f);inp.value='';
}

document.getElementById('inDate').value=today();
document.getElementById('outDate').value=today();
repFrom.value=today();repTo.value=today();
