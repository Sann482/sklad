<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Склад геотекстилю</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-sklad-180.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#f4f6f8;--card:#fff;--line:#e2e8f0;--txt:#1e293b;--mut:#64748b;--acc:#2563eb;--grn:#16a34a;--red:#dc2626;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
body{background:var(--bg);color:var(--txt);padding:16px;}
h1{font-size:22px;margin-bottom:4px;}
.sub{color:var(--mut);font-size:13px;margin-bottom:14px;}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.tab{padding:9px 18px;border:1px solid var(--line);background:var(--card);border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;color:var(--mut);}
.tab.act{background:var(--acc);color:#fff;border-color:var(--acc);}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{background:#f1f5f9;text-align:left;padding:7px 9px;border-bottom:2px solid var(--line);white-space:nowrap;position:sticky;top:0;}
td{padding:6px 9px;border-bottom:1px solid var(--line);overflow:hidden;text-overflow:ellipsis;}
tr:hover td{background:#f8fafc;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.sec{background:#e0e7ff!important;font-weight:700;font-size:14px;}
.sec2{background:#fee2e2!important;font-weight:700;font-size:14px;}
.tot td{background:#f1f5f9;font-weight:700;}
.grand td{background:#dbeafe;font-weight:700;}
label{display:block;font-size:12.5px;font-weight:600;color:var(--mut);margin-bottom:3px;}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;font-size:14px;background:#fff;}
input:focus,select:focus{outline:2px solid #bfdbfe;border-color:var(--acc);}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
.row>div{flex:1;min-width:120px;}
.btn{padding:10px 22px;border:none;border-radius:8px;font-size:14.5px;font-weight:700;cursor:pointer;color:#fff;background:var(--acc);}
.btn.grn{background:var(--grn);} .btn.red{background:var(--red);}
.btn.sm{padding:5px 12px;font-size:12.5px;font-weight:600;}
.btn.ghost{background:#fff;color:var(--txt);border:1px solid var(--line);}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.chip{padding:6px 14px;border:1px solid var(--line);border-radius:20px;background:#fff;cursor:pointer;font-size:13px;}
.chip.act{background:var(--acc);color:#fff;border-color:var(--acc);}
.badge{display:inline-block;padding:2px 9px;border-radius:12px;font-size:12px;font-weight:700;}
.b-in{background:#dcfce7;color:#166534;} .b-out{background:#fee2e2;color:#991b1b;}
.msg{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:14px;display:none;}
.msg.ok{background:#dcfce7;color:#166534;display:block;}
.msg.err{background:#fee2e2;color:#991b1b;display:block;}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 18px;flex:1;min-width:150px;}
.stat .v{font-size:20px;font-weight:800;} .stat .l{font-size:12px;color:var(--mut);}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.tools{display:flex;gap:8px;flex-wrap:wrap;}
.scroll{max-height:65vh;overflow:auto;}
.del{color:var(--red);cursor:pointer;font-weight:700;border:none;background:none;font-size:15px;}
.zero td{color:#94a3b8;}
th.srt{cursor:pointer;user-select:none;position:relative;}
th.srt:hover{background:#e2e8f0;}
th.drag-over{background:#bfdbfe!important;}
.rsz{position:absolute;top:0;right:-4px;width:9px;height:100%;cursor:col-resize;z-index:5;}
.rsz:hover{background:#93c5fd;}
.relwrap{position:relative;display:inline-block;}
.colmenu{position:absolute;right:0;top:110%;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 14px;box-shadow:0 4px 14px rgba(0,0,0,.15);z-index:50;display:none;min-width:190px;}
.colmenu label{display:flex;gap:8px;align-items:center;font-size:13px;margin:6px 0;color:var(--txt);font-weight:500;cursor:pointer;}
.colmenu input{width:auto;}
.g2{color:var(--red);font-weight:700;font-size:11px;}
tr.main25 td{background:#fef9c3;}
tr.main25:hover td{background:#fef08a;}
.mcard.main25c{background:#fef9c3;border-color:#fde047;}
.sugg{margin-bottom:6px;}
.sug{padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;margin-bottom:4px;cursor:pointer;font-size:14px;}
.sug:hover{background:#eff6ff;border-color:var(--acc);}
.sub2{color:var(--mut);font-size:12.5px;}
.sug.m25{background:#fef9c3;border-color:#fde047;}
.sug.act{background:#dbeafe!important;border-color:var(--acc)!important;}
.bline{background:#f8fafc;border:1px solid var(--line);border-radius:8px;padding:7px 10px;margin-top:6px;font-size:13.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.bline .del{margin-left:auto;}
.bline.btot{background:#dbeafe;font-weight:700;}
.zB td{background:#eef2f7;}
.banner{background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
@media(max-width:700px){
 body{padding:8px;}
 h1{font-size:18px;}
 .tools .btn{padding:6px 9px;font-size:12px;}
 .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;}
 .tab{padding:8px 13px;font-size:13px;flex:0 0 auto;}
 .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
 .stat{min-width:0;padding:10px 12px;}
 .stat .v{font-size:17px;}
 input,select,textarea{font-size:16px;}
 .hint{display:none;}
 .ssr{flex:1 1 100%;}
 .scroll{max-height:none;-webkit-overflow-scrolling:touch;}
 #logTable{min-width:760px;}
 td,th{padding:5px 6px;font-size:12.5px;}
}
.mcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:7px;}
.mcard.zero2{opacity:.55;}
.mc1{font-size:14.5px;margin-bottom:3px;}
.mc2{font-size:13px;color:var(--mut);}
.mc2 b{color:var(--txt);font-size:14px;}
.msec{background:#e0e7ff;border-radius:8px;padding:7px 12px;font-weight:700;font-size:13px;margin:10px 0 7px;}
.msec2{background:#fee2e2;}
.mtot{padding:6px 12px;font-weight:700;font-size:13px;color:var(--mut);}
.grandm{background:#dbeafe;border-radius:8px;color:var(--txt);margin-top:6px;padding:9px 12px;}
</style>
</head>
<body>
<div class="hdr">
<div><h1>📦 Склад геотекстилю</h1><div class="sub">Термофіксований (т) та голкопробивний · 1 і 2 сорт · <span id="storageInfo">сховище: браузер</span></div></div>
<div class="tools">
<a class="btn ghost sm" href="./" style="text-decoration:none">⌂ Меню</a>
<button class="btn ghost sm" onclick="tgSend(event)" title="Shift+клік — налаштування">📲 Telegram</button>
<button class="btn ghost sm" onclick="exportXLSX()">⬇ Експорт Excel</button>
<button class="btn ghost sm" onclick="backup()">💾 Резервна копія</button>
<button class="btn ghost sm" onclick="document.getElementById('restoreFile').click()">📂 Відновити</button>
<input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restore(this)">
</div>
</div>

<div class="tabs">
<button class="tab act" data-t="stock" onclick="showTab('stock')">Склад</button>
<button class="tab" data-t="in" onclick="showTab('in')">➕ Прихід</button>
<button class="tab" data-t="out" onclick="showTab('out')">➖ Списання</button>
<button class="tab" data-t="log" onclick="showTab('log')">Журнал</button>
<button class="tab" data-t="rep" onclick="showTab('rep')">Звіт за день</button>
</div>

<!-- СКЛАД -->
<div id="tab-stock">
<div class="stats" id="stockStats"></div>
<div class="card">
<div class="chips">
<button class="chip" onclick="setGrade('',this)">Всі сорти</button>
<button class="chip act" onclick="setGrade(1,this)">1 сорт</button>
<button class="chip" onclick="setGrade(2,this)">2 сорт</button>
</div>
<div class="row" style="margin-bottom:8px;align-items:center">
<div class="ssr" style="flex:2"><input id="stockSearch" placeholder="Пошук: 100т, сірий, 1.5 ..." oninput="renderStock()"></div>
<div><label style="display:inline"><input type="checkbox" id="hideZero" style="width:auto" onchange="renderStock()" checked> приховати нульові</label></div>
<div class="relwrap" style="flex:0;min-width:auto">
<button class="btn ghost sm" onclick="toggleColMenu()">⚙ Колонки</button>
<div class="colmenu" id="colMenu"></div>
</div>
</div>
<div class="scroll"><table id="stockTable"></table></div>
<div id="stockCards"></div>
<div class="sub hint" style="margin-top:6px">Клік по заголовку — сортування · перетягніть заголовок — змінити порядок · потягніть за правий край заголовка — змінити ширину</div>
</div>
</div>

<!-- ПРИХІД -->
<div id="tab-in" style="display:none">
<div class="card">
<h3 style="margin-bottom:12px">➕ Прихід товару</h3>
<div class="msg" id="inMsg"></div>
<div class="row">
<div style="flex:2"><label>Існуюча позиція (необов'язково)</label><input id="inExistSearch" placeholder="🔍 Пошук: 150 сірий... (↓↑ і Enter)" oninput="inSuggest()" onkeydown="sugKey(event,'in')" autocomplete="off" style="margin-bottom:6px"><div class="sugg" id="inSugg"></div><select id="inExist" onchange="fillFromExist()"><option value="">— нова позиція —</option></select></div>
<div><label>Сорт</label><select id="inGrade"><option value="1">1 сорт</option><option value="2">2 сорт</option></select></div>
</div>
<div class="row">
<div><label>Тип</label><select id="inKind"><option value="t">Термофіксований (т)</option><option value="g">Голкопробивний</option></select></div>
<div><label>Марка (щільність г/м²)</label><input id="inMarka" type="number" placeholder="100" oninput="document.getElementById('inDens').value=this.value/1000"></div>
<div><label>Вага кг/м²</label><input id="inDens" type="number" step="0.01" placeholder="0.1"></div>
</div>
<div class="row">
<div><label>Ширина, м</label><input id="inW" type="number" step="0.05" placeholder="2"></div>
<div><label>Довжина, м</label><input id="inL" type="number" step="1" placeholder="50" value="50"></div>
<div><label>Примітка (колір тощо)</label><input id="inNote" placeholder="сірий / зелений / негорюч / —"></div>
</div>
<div class="row">
<div><label>Кількість рулонів</label><input id="inRolls" type="number" min="1" placeholder="10" onkeydown="if(event.key==='Enter'){event.preventDefault();addInLine();}"></div>
<div><label>Дата</label><input id="inDate" type="date"></div>
<div style="flex:2"><label>Коментар</label><input id="inComment" placeholder="постачальник, накладна..."></div>
</div>
<div class="sub" id="inCalc"></div>
<div id="inBatchBox" style="margin-bottom:10px"></div>
<button class="btn ghost" onclick="addInLine()" style="margin-right:8px">➕ Додати до списку</button>
<button class="btn grn" onclick="doIn()">Оприбуткувати</button>
</div>
</div>

<!-- СПИСАННЯ -->
<div id="tab-out" style="display:none">
<div class="card">
<h3 style="margin-bottom:12px">➖ Списання (відвантаження)</h3>
<div class="msg" id="outMsg"></div>
<div class="chips">
<button class="chip" onclick="setOutGrade('',this)">Всі сорти</button>
<button class="chip act" onclick="setOutGrade(1,this)">1 сорт</button>
<button class="chip" onclick="setOutGrade(2,this)">2 сорт</button>
</div>
<div class="row">
<div><label>Позиція (тільки з залишком)</label><input id="outItemSearch" placeholder="🔍 Пошук: 150 сірий... (↓↑ і Enter)" oninput="outSuggest()" onkeydown="sugKey(event,'out')" autocomplete="off" style="margin-bottom:6px"><div class="sugg" id="outSugg"></div><select id="outItem" onchange="outInfo()"></select></div>
</div>
<div class="row">
<div style="flex:0;min-width:200px;max-width:260px"><label>Кількість рулонів</label><input id="outRolls" type="number" min="1" oninput="outInfo()" onkeydown="if(event.key==='Enter'){event.preventDefault();addOutLine();}"></div>
</div>
<div class="row">
<div><label>Дата</label><input id="outDate" type="date"></div>
<div style="flex:2"><label>Клієнт</label><input id="outClient" placeholder="кому відвантажено"></div>
<div style="flex:2"><label>Коментар</label><input id="outComment"></div>
</div>
<div class="sub" id="outCalc"></div>
<div id="outBatchBox" style="margin-bottom:10px"></div>
<button class="btn ghost" onclick="addOutLine()" style="margin-right:8px">➕ Додати до списку</button>
<button class="btn red" onclick="doOut()">Списати</button>
</div>
</div>

<!-- ЖУРНАЛ -->
<div id="tab-log" style="display:none">
<div class="card">
<div class="row">
<div><label>З дати</label><input type="date" id="logFrom" onchange="renderLog()"></div>
<div><label>По дату</label><input type="date" id="logTo" onchange="renderLog()"></div>
<div><label>Тип</label><select id="logType" onchange="renderLog()"><option value="">Всі операції</option><option value="in">Прихід</option><option value="out">Списання</option></select></div>
<div><label>Сорт</label><select id="logGrade" onchange="renderLog()"><option value="">Всі</option><option value="1">1 сорт</option><option value="2">2 сорт</option></select></div>
<div style="flex:2"><label>Пошук</label><input id="logSearch" placeholder="товар, клієнт..." oninput="renderLog()"></div>
</div>
<div class="sub" id="logTotals"></div>
<div class="scroll"><table id="logTable"></table></div>
</div>
</div>

<!-- ЗВІТ -->
<div id="tab-rep" style="display:none">
<div class="card">
<h3 style="margin-bottom:10px">Звіт по списанню</h3>
<div class="chips">
<button class="chip act" onclick="repQuick('today',this)">Сьогодні</button>
<button class="chip" onclick="repQuick('yest',this)">Вчора</button>
<button class="chip" onclick="repQuick('week',this)">7 днів</button>
<button class="chip" onclick="repQuick('month',this)">Місяць</button>
</div>
<div class="row">
<div><label>З дати</label><input type="date" id="repFrom" onchange="renderRep()"></div>
<div><label>По дату</label><input type="date" id="repTo" onchange="renderRep()"></div>
<div><label>Сорт</label><select id="repGrade" onchange="renderRep()"><option value="">Всі</option><option value="1">1 сорт</option><option value="2">2 сорт</option></select></div>
</div>
<div id="repBody"></div>
</div>
</div>

const CLOUD_PATH='geo';
const LS_KEY='geoSklad_v1';
let DB;

function today(){return new Date().toISOString().slice(0,10);}
function newId(){DB.nextId=Math.max((DB.nextId||0)+1,Date.now());return DB.nextId;}
function keyOf(it){return [it.kind,it.grade||1,it.marka,it.w,it.l,(it.note||'').trim().toLowerCase()].join('|');}
function nameOf(it){
  let n='Геотекстиль '+it.marka+(it.kind==='t'?'т':' голкопр.');
  if((it.grade||1)==2)n+=' (2 сорт)';
  n+=' · '+it.w+'×'+it.l;
  if(it.note)n+=' · '+it.note;
  return n;
}
function m2(it,rolls){return +(rolls*it.w*it.l).toFixed(2);}
function kg(it,rolls){return +(rolls*it.w*it.l*it.dens).toFixed(1);}
function fmt(n){return (+n).toLocaleString('uk-UA');}

function migrate(){
  const map={},ni={};
  Object.entries(DB.items).forEach(([ok,it])=>{
    it.grade=it.grade||1;
    const nk=keyOf(it);map[ok]=nk;
    if(ni[nk])ni[nk].rolls+=it.rolls;else ni[nk]=it;
  });
  DB.items=ni;
  (DB.ops||[]).forEach(o=>{if(map[o.key])o.key=map[o.key];});
  // якщо в базі ще немає 2 сорту — додати стартові залишки 2 сорту
  if(!Object.values(DB.items).some(i=>(i.grade||1)==2)){
    INITIAL.filter(i=>(i.grade||1)==2).forEach(i=>{const k=keyOf(i);if(!DB.items[k])DB.items[k]={...i};});
  }
}
function load(){
  try{DB=JSON.parse(localStorage.getItem(LS_KEY));}catch(e){DB=null;}
  if(!DB||!DB.items){
    DB={items:{},ops:[],seeded:today()};
    INITIAL.forEach(it=>{DB.items[keyOf(it)]={...it};});
    save();
  }
  migrate();
}
function save(){
  localStorage.setItem(LS_KEY,JSON.stringify(DB));
  srvPush();
}

/* ---------- ЗБЕРЕЖЕННЯ У ФАЙЛ НА ДИСКУ ---------- */
let fileHandle=null,pendingHandle=null;
function idb(){return new Promise((res,rej)=>{const r=indexedDB.open('geoSkladFS',1);r.onupgradeneeded=()=>r.result.createObjectStore('kv');r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function idbSet(k,v){const d=await idb();return new Promise((res,rej)=>{const t=d.transaction('kv','readwrite');t.objectStore('kv').put(v,k);t.oncomplete=res;t.onerror=()=>rej(t.error);});}
async function idbGet(k){const d=await idb();return new Promise((res,rej)=>{const t=d.transaction('kv');const q=t.objectStore('kv').get(k);q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);});}
async function writeFile(){
  if(!fileHandle)return;
  try{const w=await fileHandle.createWritable();await w.write(JSON.stringify(DB));await w.close();}
  catch(e){alert('⚠ Не вдалося записати у файл даних: '+e.message+'\nЗробіть «Резервна копія», щоб не втратити дані.');}
}
function updateStorageInfo(){}
const JSON_TYPE=[{description:'Дані складу',accept:{'application/json':['.json']}}];
async function connectDataFile(){
  if(!window.showSaveFilePicker){alert('Ваш браузер не підтримує збереження у файл — потрібен Chrome або Edge.\nНаразі дані зберігаються у браузері. Регулярно робіть «Резервна копія».');return;}
  try{
    let h;
    if(confirm('OK — створити НОВИЙ файл даних.\nСкасувати — відкрити ВЖЕ ІСНУЮЧИЙ файл даних.')){
      h=await showSaveFilePicker({suggestedName:'sklad-dani.json',types:JSON_TYPE});
      fileHandle=h;await writeFile();
    }else{
      [h]=await showOpenFilePicker({types:JSON_TYPE});
      fileHandle=h;
      try{const d=JSON.parse(await (await h.getFile()).text());if(d&&d.items){DB=d;migrate();}else await writeFile();}
      catch(e){await writeFile();}
    }
    await idbSet('handle',h);
    localStorage.removeItem(LS_KEY);
    updateStorageInfo();showTab('stock');
    alert('✔ Дані тепер зберігаються у файлі «'+h.name+'» на вашому диску, а не в браузері.\nКожна операція записується автоматично.');
  }catch(e){/* скасовано */}
}
async function useHandle(h){
  fileHandle=h;
  try{const d=JSON.parse(await (await h.getFile()).text());if(d&&d.items){DB=d;migrate();}}catch(e){}
  localStorage.removeItem(LS_KEY);
  document.getElementById('fileBanner').style.display='none';
  updateStorageInfo();renderStock();
}
async function reopenFile(){
  if(!pendingHandle)return;
  try{
    const p=await pendingHandle.requestPermission({mode:'readwrite'});
    if(p==='granted')await useHandle(pendingHandle);
  }catch(e){}
}
async function initStorage(){
  try{
    const h=await idbGet('handle');
    if(h&&h.queryPermission){
      if(await h.queryPermission({mode:'readwrite'})==='granted')await useHandle(h);
      else{pendingHandle=h;document.getElementById('fileBanner').style.display='flex';}
    }
  }catch(e){}
  updateStorageInfo();
}


/* ---------- ХМАРНА СИНХРОНІЗАЦІЯ ---------- */
const CL_KEY=LS_KEY+'_cloud';
let CL=null;try{CL=JSON.parse(localStorage.getItem(CL_KEY));}catch(e){}
let cloudStatus='';
function cloudEp(){return CL.url+'/'+encodeURIComponent(CLOUD_PATH+'-'+CL.key)+'.json';}
function setCloudStatus(s){cloudStatus=s;updateStorageInfo();}
async function cloudPut(){
  if(!CL)return;
  try{
    const r=await fetch(cloudEp(),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(DB)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    setCloudStatus('синхронізовано '+new Date().toTimeString().slice(0,5));
  }catch(e){setCloudStatus('⚠ НЕ синхронізовано — перевірте інтернет');}
}
async function cloudLoad(silent){
  if(!CL)return;
  try{
    const r=await fetch(cloudEp());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d&&d.items){DB=d;afterCloudLoad();}
    setCloudStatus('синхронізовано '+new Date().toTimeString().slice(0,5));
  }catch(e){
    setCloudStatus('⚠ офлайн — показано локальну копію');
    if(!silent)alert('Хмара недоступна: '+e.message);
  }
}
function afterCloudLoad(){
  migrate();localStorage.setItem(LS_KEY,JSON.stringify(DB));
  renderStock();
}
async function cloudSetup(){
  if(CL&&confirm('Хмарна синхронізація вже увімкнена.\nOK — змінити налаштування.\nСкасувати — ВИМКНУТИ хмару на цьому пристрої.')===false){
    localStorage.removeItem(CL_KEY);CL=null;updateStorageInfo();
    alert('Хмарну синхронізацію вимкнено. Дані залишилися у хмарі та локально.');
    return;
  }
  let url=prompt('Крок 1/2. Вставте адресу бази Firebase (Database URL),\nнаприклад: https://mijsklad-default-rtdb.europe-west1.firebasedatabase.app',(CL&&CL.url)||'');
  if(url===null)return;
  url=url.trim().replace(/\/+$/,'');
  if(!url.startsWith('http')){alert('Це не схоже на адресу. Вона має починатися з https://');return;}
  let key=prompt('Крок 2/2. Придумайте секретний ключ (довге слово/фраза).\nНа ВСІХ пристроях вводьте однаковий ключ — це ваш пароль до даних.',(CL&&CL.key)||'');
  if(key===null)return;
  key=key.trim();
  if(key.length<4){alert('Ключ закороткий — потрібно мінімум 4 символи.');return;}
  CL={url,key};
  try{
    const r=await fetch(cloudEp());
    if(!r.ok)throw new Error('HTTP '+r.status+' — перевірте адресу і правила доступу бази');
    const d=await r.json();
    if(d&&d.items){
      if(confirm('У хмарі ВЖЕ Є дані ('+Object.keys(d.items).length+' позицій).\nOK — завантажити хмарні дані на цей пристрій.\nСкасувати — ЗАМІНИТИ хмарні дані локальними.')){DB=d;afterCloudLoad();}
      else await cloudPut();
    }else await cloudPut();
    localStorage.setItem(CL_KEY,JSON.stringify(CL));
    updateStorageInfo();renderStock();
    alert('✔ Хмару підключено! Тепер усі пристрої з цією адресою і ключем бачать одні й ті самі залишки.');
  }catch(e){CL=null;alert('Не вдалося підключитися: '+e.message);}
}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'&&CL)cloudLoad(true);});

async function tgSend(ev){
  if(ev&&ev.shiftKey){tgSetup();return;}
  if(!TG){await tgSetup();if(!TG)return;}
  const base='https://api.telegram.org/bot'+TG.token;
  try{
    const r=await fetch(base+'/sendMessage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TG.chat,text:tgSummary()})});
    const d=await r.json();if(!d.ok)throw new Error(d.description);

}
function tgSummary(){
  const by={};let tr=0,tm=0,tk=0;
  Object.values(DB.items).forEach(it=>{
    if(!it.rolls)return;
    const g=it.grade||1;
    const key=g+'|'+it.kind+'|'+it.marka;
    if(!by[key])by[key]={r:0,m:0,g,marka:it.marka,kind:it.kind};
    const m=m2(it,it.rolls);
    by[key].r+=it.rolls;by[key].m+=m;tr+=it.rolls;tm+=m;tk+=kg(it,it.rolls);
  });
  const rows=Object.values(by).sort((a,b)=>a.g-b.g||(a.kind===b.kind?a.marka-b.marka:(a.kind==='t'?-1:1)));
  let txt='📦 ГЕОТЕКСТИЛЬ — залишки на '+today()+'\n';
  let curG=0;
  rows.forEach(x=>{
    if(x.g!==curG){curG=x.g;txt+='\n— '+(x.g==2?'2 СОРТ':'1 СОРТ')+' —\n';}
    txt+=(x.kind==='t'?x.marka+'т':x.marka+' голкопр.')+': '+fmt(x.r)+' рул · '+fmt(Math.round(x.m))+' м²\n';
  });
  txt+='\nВСЬОГО: '+fmt(tr)+' рул · '+fmt(Math.round(tm))+' м² · '+(tk/1000).toFixed(1)+' т';
  txt+='\nПовна таблиця — у файлі нижче 👇';
  return txt.slice(0,4000);
}

let REV=0;
function setSrvStatus(s){const el=document.getElementById('storageInfo');if(el)el.innerHTML='🌐 '+s;}
async function srvPull(silent){
  try{
    const r=await fetch('api/'+SRV_STORE);
    if(r.status===401){location.href='login';return;}
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j&&j.data&&j.data.items){
      DB=j.data;REV=j.rev;migrate();
      localStorage.setItem(LS_KEY,JSON.stringify(DB));
      renderStock();
    }else{
      REV=(j&&j.rev)||0;
      await srvPushNow();
    }
    setSrvStatus('синхронізовано '+new Date().toTimeString().slice(0,5));
  }catch(e){setSrvStatus('⚠ офлайн — показано локальну копію');}
}
async function srvPushNow(){
  const r=await fetch('api/'+SRV_STORE,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({rev:REV,data:DB})});
  if(r.status===401){location.href='login';return;}
  if(r.status===409){
    const j=await r.json();
    if(!j.data){REV=j.rev||0;return srvPushNow();}
    DB=j.data;REV=j.rev;migrate();
    renderStock();
    alert('Дані щойно оновили з іншого пристрою — екран синхронізовано. Повторіть вашу останню операцію.');
    return;
  }
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();REV=j.rev;
  setSrvStatus('синхронізовано '+new Date().toTimeString().slice(0,5));
}
function srvPush(){srvPushNow().catch(e=>setSrvStatus('⚠ НЕ збережено на сервер — перевірте інтернет!'));}

/* ---------- ПРИХІД ---------- */
function itemsSorted(){
  return Object.values(DB.items).sort((a,b)=>((a.grade||1)-(b.grade||1))||(a.kind===b.kind?a.marka-b.marka:(a.kind==='t'?-1:1)));
}
function prepIn(){
  if(!document.getElementById('inDate').value)document.getElementById('inDate').value=today();
  const sel=document.getElementById('inExist');
  sel.innerHTML='<option value="">— нова позиція —</option>'+itemsSorted().map(it=>`<option value="${keyOf(it)}">${nameOf(it)} (залишок: ${it.rolls})</option>`).join('');
  inSuggest();
}
let _sugIn=[],_sugOut=[],_inIdx=-1,_outIdx=-1,inBatch=[],outBatch=[];
function matchItems(q,onlyStock){
  const ws=(q||'').toLowerCase().trim().split(/\s+/).filter(Boolean);
  if(!ws.length)return [];
  let list=itemsSorted();
  if(onlyStock)list=list.filter(i=>i.rolls>0&&(!outGradeFilter||(i.grade||1)==outGradeFilter));
  return list.filter(it=>{const n=(nameOf(it)+' '+((it.grade||1)==2?'2 сорт':'1 сорт')).toLowerCase();return ws.every(w=>n.includes(w));}).slice(0,30);
}
function inSuggest(keep){
  const box=document.getElementById('inSugg');if(!box)return;
  if(!keep){_inIdx=-1;_sugIn=matchItems((document.getElementById('inExistSearch')||{}).value,false);}
  box.innerHTML=_sugIn.map((it,i)=>`<div class="sug${(it.w==2&&it.l==50)?' m25':''}${i===_inIdx?' act':''}" onclick="pickIn(${i})">${nameOf(it)} <span class="sub2">· залишок: ${fmt(it.rolls)}</span></div>`).join('');
}
function sugKey(e,which){
  const list=which==='in'?_sugIn:_sugOut;
  if(!list.length)return;
  if(e.key==='ArrowDown'){e.preventDefault();if(which==='in'){_inIdx=Math.min(_inIdx+1,list.length-1);inSuggest(true);}else{_outIdx=Math.min(_outIdx+1,list.length-1);outSuggest(true);}}
  else if(e.key==='ArrowUp'){e.preventDefault();if(which==='in'){_inIdx=Math.max(_inIdx-1,0);inSuggest(true);}else{_outIdx=Math.max(_outIdx-1,0);outSuggest(true);}}
  else if(e.key==='Enter'){e.preventDefault();if(which==='in')pickIn(_inIdx<0?0:_inIdx);else pickOut(_outIdx<0?0:_outIdx);}
  else if(e.key==='Escape'){document.getElementById(which==='in'?'inSugg':'outSugg').innerHTML='';}
}
function pickIn(i){
  const it=_sugIn[i];if(!it)return;
  document.getElementById('inExist').value=keyOf(it);
  fillFromExist();
  document.getElementById('inExistSearch').value=nameOf(it);
  document.getElementById('inSugg').innerHTML='';
  const r=document.getElementById('inRolls');if(r&&r.focus)r.focus();
}
function outSuggest(keep){
  const box=document.getElementById('outSugg');if(!box)return;
  if(!keep){_outIdx=-1;_sugOut=matchItems((document.getElementById('outItemSearch')||{}).value,true);}
  box.innerHTML=_sugOut.map((it,i)=>`<div class="sug${(it.w==2&&it.l==50)?' m25':''}${i===_outIdx?' act':''}" onclick="pickOut(${i})">${nameOf(it)} <span class="sub2">· залишок: ${fmt(it.rolls)}</span></div>`).join('');
}
function pickOut(i){
  const it=_sugOut[i];if(!it)return;
  document.getElementById('outItem').value=keyOf(it);
  document.getElementById('outItemSearch').value=nameOf(it);
  document.getElementById('outSugg').innerHTML='';
  outInfo();
  const r=document.getElementById('outRolls');if(r&&r.focus)r.focus();
}
function fillFromExist(){
  const k=document.getElementById('inExist').value;
  if(!k)return;
  const it=DB.items[k];
  inKind.value=it.kind;inGrade.value=it.grade||1;inMarka.value=it.marka;inDens.value=it.dens;inW.value=it.w;inL.value=it.l;inNote.value=it.note||'';
}
function readInForm(){
  const it={kind:inKind.value,grade:+inGrade.value||1,marka:+inMarka.value,dens:+inDens.value,w:+inW.value,l:+inL.value,note:inNote.value.trim()};
  const rolls=+inRolls.value;
  if(!it.marka||!it.w||!it.l||!rolls||rolls<1)return null;
  if(!it.dens)it.dens=it.marka/1000;
  it.rolls=rolls;
  return it;
}
function addInLine(){
  const msg=document.getElementById('inMsg');
  const line=readInForm();
  if(!line){msg.className='msg err';msg.textContent='Заповніть: марку, ширину, довжину і кількість рулонів.';return;}
  inBatch.push(line);
  msg.className='msg';msg.textContent='';
  inRolls.value='';
  const s=document.getElementById('inExistSearch');if(s){s.value='';if(s.focus)s.focus();}
  document.getElementById('inSugg').innerHTML='';
  renderInBatch();
}
function renderInBatch(){
  const box=document.getElementById('inBatchBox');if(!box)return;
  if(!inBatch.length){box.innerHTML='';return;}
  let tr=0,tm=0;
  box.innerHTML='<b style="font-size:13px">До оприбуткування:</b>'+inBatch.map((x,i)=>{const _m=+(x.rolls*x.w*x.l).toFixed(1);tr+=x.rolls;tm+=_m;
    return `<div class="bline">${nameOf(x)} — <b>${fmt(x.rolls)} рул</b> (${fmt(_m)} м²) <button class="del" onclick="inBatch.splice(${i},1);renderInBatch()">✕</button></div>`;}).join('')+
    `<div class="bline btot">Разом: ${inBatch.length} позиц. · ${fmt(tr)} рул · ${fmt(+tm.toFixed(1))} м²</div>`;
}
function doIn(){
  const msg=document.getElementById('inMsg');
  const date=inDate.value;
  const cur=readInForm();
  if(cur){inBatch.push(cur);inRolls.value='';}
  if(!inBatch.length){msg.className='msg err';msg.textContent='Заповніть форму або додайте позиції до списку.';return;}
  if(!date){msg.className='msg err';msg.textContent='Вкажіть дату.';renderInBatch();return;}
  const comment=inComment.value.trim();
  const bid=newId();
  let tr=0,tm=0;
  inBatch.forEach(x=>{
    const k=keyOf(x);
    if(!DB.items[k])DB.items[k]={kind:x.kind,grade:x.grade,marka:x.marka,dens:x.dens,w:x.w,l:x.l,note:x.note,rolls:0};
    DB.items[k].rolls+=x.rolls;
    DB.items[k].dens=x.dens;
    DB.ops.push({id:newId(),type:'in',date,key:k,batch:bid,rolls:x.rolls,m2:m2(x,x.rolls),kg:kg(x,x.rolls),client:'',comment,ts:new Date().toISOString()});
    tr+=x.rolls;tm+=m2(x,x.rolls);
  });
  const n=inBatch.length;
  save();
  inBatch=[];renderInBatch();
  msg.className='msg ok';msg.textContent=`✔ Оприбутковано ${n} позиц.: ${fmt(tr)} рул (${fmt(+tm.toFixed(1))} м²).`;
  inComment.value='';prepIn();
}

/* ---------- СПИСАННЯ ---------- */
function setOutGrade(g,btn){
  outGradeFilter=g;
  btn.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('act'));
  btn.classList.add('act');
  prepOut();
}
function prepOut(){
  if(!document.getElementById('outDate').value)document.getElementById('outDate').value=today();
  const sel=document.getElementById('outItem');
  const items=itemsSorted().filter(i=>i.rolls>0&&(!outGradeFilter||(i.grade||1)==outGradeFilter));
  sel.innerHTML='<option value="">— оберіть позицію —</option>'+items.map(it=>`<option value="${keyOf(it)}">${nameOf(it)} (залишок: ${it.rolls})</option>`).join('');
  outSuggest();
  outInfo();
}
function outInfo(){
  const k=outItem.value, r=+outRolls.value, el=document.getElementById('outCalc');
  if(!k){el.textContent='';return;}
  const it=DB.items[k];
  let t=`Залишок: ${it.rolls} рул. (${fmt(m2(it,it.rolls))} м²)`;
  if(r)t+=` → списується ${r} рул. = ${fmt(m2(it,r))} м², ${fmt(kg(it,r))} кг → залишиться ${it.rolls-r} рул.`;
  el.textContent=t;
}
function addOutLine(){
  const msg=document.getElementById('outMsg');
  const k=outItem.value, rolls=+outRolls.value;
  if(!k||!rolls||rolls<1){msg.className='msg err';msg.textContent='Оберіть позицію і кількість рулонів.';return;}
  const it=DB.items[k];
  const already=outBatch.filter(x=>x.key===k).reduce((s,x)=>s+x.rolls,0);
  if(rolls+already>it.rolls){msg.className='msg err';msg.textContent=`Недостатньо! Залишок ${it.rolls} рул${already?' (у списку вже '+already+')':''}.`;return;}
  outBatch.push({key:k,rolls});
  msg.className='msg';msg.textContent='';
  outRolls.value='';outItem.value='';
  const s=document.getElementById('outItemSearch');if(s){s.value='';if(s.focus)s.focus();}
  document.getElementById('outSugg').innerHTML='';
  outInfo();renderOutBatch();
}
function renderOutBatch(){
  const box=document.getElementById('outBatchBox');if(!box)return;
  if(!outBatch.length){box.innerHTML='';return;}
  let tr=0,tm=0;
  box.innerHTML='<b style="font-size:13px">До списання:</b>'+outBatch.map((x,i)=>{const it=DB.items[x.key];const _m=it?m2(it,x.rolls):0;tr+=x.rolls;tm+=_m;
    return `<div class="bline">${it?nameOf(it):x.key} — <b>${fmt(x.rolls)} рул</b> (${fmt(_m)} м²) <button class="del" onclick="outBatch.splice(${i},1);renderOutBatch()">✕</button></div>`;}).join('')+
    `<div class="bline btot">Разом: ${outBatch.length} позиц. · ${fmt(tr)} рул · ${fmt(+tm.toFixed(1))} м²</div>`;
}
function doOut(){
  const msg=document.getElementById('outMsg');
  const date=outDate.value;
  if(outItem.value&&+outRolls.value>0){
    addOutLine();
    if((document.getElementById('outMsg').className||'').includes('err'))return;
  }
  if(!outBatch.length){msg.className='msg err';msg.textContent='Додайте хоча б одну позицію до списку.';return;}
  if(!date){msg.className='msg err';msg.textContent='Вкажіть дату.';return;}
  const need={};outBatch.forEach(x=>need[x.key]=(need[x.key]||0)+x.rolls);
  for(const k in need){const it=DB.items[k];if(!it||need[k]>it.rolls){msg.className='msg err';msg.textContent=`Недостатньо на складі: ${it?nameOf(it):k}.`;return;}}
  const client=outClient.value.trim(),comment=outComment.value.trim();
  const bid=newId();
  let tr=0,tm=0;
  outBatch.forEach(x=>{
    const it=DB.items[x.key];
    it.rolls-=x.rolls;
    DB.ops.push({id:newId(),type:'out',date,key:x.key,batch:bid,rolls:x.rolls,m2:m2(it,x.rolls),kg:kg(it,x.rolls),client,comment,ts:new Date().toISOString()});
    tr+=x.rolls;tm+=m2(it,x.rolls);
  });
  const n=outBatch.length;
  save();
  outBatch=[];renderOutBatch();
  msg.className='msg ok';msg.textContent=`✔ Списано ${n} позиц.: ${fmt(tr)} рул (${fmt(+tm.toFixed(1))} м²).`;
  outClient.value='';outComment.value='';prepOut();
}

/* ---------- ЖУРНАЛ ---------- */
function opGrade(o){const it=DB.items[o.key];return it?(it.grade||1):+(o.key.split('|')[1]||1);}
function renderLog(){
  const f=logFrom.value,t=logTo.value,ty=logType.value,gr=logGrade.value,q=(logSearch.value||'').toLowerCase();
  let ops=DB.ops.slice().reverse();
  ops=ops.filter(o=>(!f||o.date>=f)&&(!t||o.date<=t)&&(!ty||o.type===ty)&&(!gr||opGrade(o)==gr));
  if(q)ops=ops.filter(o=>{const it=DB.items[o.key];return ((it?nameOf(it):'')+' '+(o.client||'')+' '+(o.comment||'')).toLowerCase().includes(q);});
  let html='<tr><th>Дата</th><th>Операція</th><th>Товар</th><th class="num">Рулонів</th><th class="num">м²</th><th class="num">кг</th><th>Клієнт</th><th>Коментар</th><th></th></tr>';
  let ti=0,to=0,mi=0,mo=0,ki=0,ko=0,prevB=null,zeb=false;
  ops.forEach(o=>{
    const it=DB.items[o.key];
    if(o.type==='in'){ti+=o.rolls;mi+=o.m2;ki+=o.kg||0;}else{to+=o.rolls;mo+=o.m2;ko+=o.kg||0;}
    const bkey=(o.batch||((o.ts||'').slice(0,16))||o.id)+'|'+o.type;
    if(bkey!==prevB){zeb=!zeb;prevB=bkey;}
    html+=`<tr class="${zeb?'zA':'zB'}"><td style="white-space:nowrap">${o.date} <span class="sub2">${(o.ts||'').slice(11,16)}</span></td><td><span class="badge ${o.type==='in'?'b-in':'b-out'}">${o.type==='in'?'Прихід':'Списання'}</span></td><td>${it?nameOf(it):o.key}</td><td class="num">${o.rolls}</td><td class="num">${fmt(o.m2)}</td><td class="num">${fmt(o.kg)}</td><td>${o.client||''}</td><td>${o.comment||''}</td><td><button class="del" title="Видалити операцію (поверне залишок)" onclick="delOp(${o.id})">✕</button></td></tr>`;
  });
  if(!ops.length)html+='<tr><td colspan="9" style="text-align:center;color:var(--mut)">Операцій немає</td></tr>';
  else{
    if(ti)html+=`<tr class="tot"><td colspan="3">РАЗОМ ПРИХІД</td><td class="num">${fmt(ti)}</td><td class="num">${fmt(+mi.toFixed(1))}</td><td class="num">${fmt(+ki.toFixed(1))}</td><td colspan="3"></td></tr>`;
    if(to)html+=`<tr class="tot"><td colspan="3">РАЗОМ СПИСАНО</td><td class="num">${fmt(to)}</td><td class="num">${fmt(+mo.toFixed(1))}</td><td class="num">${fmt(+ko.toFixed(1))}</td><td colspan="3"></td></tr>`;
    html+=`<tr class="grand"><td colspan="3">БАЛАНС (прихід − списання)</td><td class="num">${fmt(ti-to)}</td><td class="num">${fmt(+(mi-mo).toFixed(1))}</td><td class="num">${fmt(+(ki-ko).toFixed(1))}</td><td colspan="3"></td></tr>`;
  }
  document.getElementById('logTable').innerHTML=html;
  document.getElementById('logTotals').innerHTML=`Прихід: <b style="color:var(--grn)">${fmt(ti)} рул. / ${fmt(+mi.toFixed(2))} м² / ${fmt(+ki.toFixed(1))} кг</b> &nbsp;·&nbsp; Списано: <b style="color:var(--red)">${fmt(to)} рул. / ${fmt(+mo.toFixed(2))} м² / ${fmt(+ko.toFixed(1))} кг</b> &nbsp;·&nbsp; операцій: ${ops.length}`;
}
function delOp(id){
  const o=DB.ops.find(x=>x.id===id);
  if(!o)return;
  if(!confirm('Видалити операцію? Залишок буде відкориговано назад.'))return;
  const it=DB.items[o.key];
  if(it)it.rolls+=(o.type==='in'?-o.rolls:o.rolls);
  if(it&&it.rolls<0)it.rolls=0;
  DB.ops=DB.ops.filter(x=>x.id!==id);
  save();renderLog();
}

/* ---------- ЗВІТ ---------- */
function repQuick(p,btn){
  btn.parentElement.querySelectorAll('.chip').forEach(c=>c.classList.remove('act'));
  btn.classList.add('act');
  const d=new Date();const iso=x=>x.toISOString().slice(0,10);
  if(p==='today'){repFrom.value=today();repTo.value=today();}
  if(p==='yest'){d.setDate(d.getDate()-1);repFrom.value=iso(d);repTo.value=iso(d);}
  if(p==='week'){const e=today();d.setDate(d.getDate()-6);repFrom.value=iso(d);repTo.value=e;}
  if(p==='month'){repFrom.value=today().slice(0,8)+'01';repTo.value=today();}
  renderRep();
}
function renderRep(){
  const f=repFrom.value||today(),t=repTo.value||today(),gr=repGrade.value;
  const ops=DB.ops.filter(o=>o.type==='out'&&o.date>=f&&o.date<=t&&(!gr||opGrade(o)==gr));
  const grp={};
  ops.forEach(o=>{
    if(!grp[o.key])grp[o.key]={rolls:0,m2:0,kg:0,clients:new Set()};
    grp[o.key].rolls+=o.rolls;grp[o.key].m2+=o.m2;grp[o.key].kg+=o.kg;
    if(o.client)grp[o.key].clients.add(o.client);
  });
  let html=`<div class="sub">Списання за період <b>${f}</b> — <b>${t}</b>${gr?' · <b>'+gr+' сорт</b>':''}</div>`;
  if(!ops.length){html+='<p style="color:var(--mut)">За цей період списань не було.</p>';}
  else{
    let tr=0,tm=0,tk=0;
    html+='<table><tr><th>Товар</th><th class="num">Рулонів</th><th class="num">м²</th><th class="num">кг</th><th>Клієнти</th></tr>';
    Object.entries(grp).forEach(([k,v])=>{
      const it=DB.items[k];tr+=v.rolls;tm+=v.m2;tk+=v.kg;
      html+=`<tr><td>${it?nameOf(it):k}</td><td class="num">${fmt(v.rolls)}</td><td class="num">${fmt(+v.m2.toFixed(2))}</td><td class="num">${fmt(+v.kg.toFixed(1))}</td><td>${[...v.clients].join(', ')}</td></tr>`;
    });
    html+=`<tr class="grand"><td>ВСЬОГО СПИСАНО</td><td class="num">${fmt(tr)}</td><td class="num">${fmt(+tm.toFixed(2))}</td><td class="num">${fmt(+tk.toFixed(1))}</td><td>${ops.length} операцій</td></tr></table>`;
  }
  document.getElementById('repBody').innerHTML=html;
}

/* ---------- ЕКСПОРТ / БЕКАП ---------- */
function buildWB(){
  const wb=XLSX.utils.book_new();
  const s1=itemsSorted().map(it=>({'Сорт':(it.grade||1),'Тип':it.kind==='t'?'термофіксований':'голкопробивний','Марка':it.marka+(it.kind==='t'?'т':''),'кг/м²':it.dens,'Ширина':it.w,'Довжина':it.l,'Примітка':it.note||'','Рулонів':it.rolls,'м²':m2(it,it.rolls),'Вага кг':kg(it,it.rolls)}));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(s1),'Залишки');
  const s2=DB.ops.map(o=>{const it=DB.items[o.key];return{'Дата':o.date,'Операція':o.type==='in'?'Прихід':'Списання','Сорт':opGrade(o),'Товар':it?nameOf(it):o.key,'Рулонів':o.rolls,'м²':o.m2,'кг':o.kg,'Клієнт':o.client||'','Коментар':o.comment||''};});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(s2),'Журнал');
  return wb;
}
function exportXLSX(){
  if(typeof XLSX==='undefined'){alert('Немає інтернету — бібліотека Excel не завантажилась.');return;}
  XLSX.writeFile(buildWB(),'Склад_геотекстиль_'+today()+'.xlsx');
}
function backup(){
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(DB));
  a.download='sklad_backup_'+today()+'.json';a.click();
}
function restore(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.items)throw 0;DB=d;migrate();save();showTab('stock');alert('Дані відновлено ✔');}catch(x){alert('Невірний файл резервної копії');}};
  r.readAsText(f);inp.value='';
}

load();
renderStock();
srvPull(true);
let _rzT;window.addEventListener('resize',()=>{clearTimeout(_rzT);_rzT=setTimeout(()=>{if(document.getElementById('tab-stock').style.display!=='none')renderStock();},200);});
document.getElementById('inDate').value=today();
document.getElementById('outDate').value=today();
repFrom.value=today();repTo.value=today();
</script>
</body>
